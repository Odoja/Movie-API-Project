image: node:22

# Cachear node_modules mellan pipelines
cache:
  paths:
    - node_modules/

# Pipeline-steg i ordning
stages:
  - lint
  - test

# Lint-steg med ESLint
lint:
  stage: lint
  script:
    - npm install
    - npm run lint

# Teststeg – kör Postman tests med Newman
api_tests:
  stage: test
  script:
    - npm install
    - echo "🧪 Running Postman/Newman API tests..."
    - npx newman run postman-collection.json -e production.postman_environment.json --insecure --reporters cli,json
    - echo "✅ Newman tests completed successfully!"
  artifacts:
    reports:
      junit: newman-results.xml
    when: always
  retry:
    max: 1

# Generate HTML test report on main branch
pages:
  stage: test
  script:
    - npm install
    - echo "📊 Generating HTML test report..."
    - npx newman run postman-collection.json -e production.postman_environment.json --insecure --reporters cli,html --reporter-html-export test-results.html
    - mkdir -p public
    - mv test-results.html public/index.html
    - echo "✅ Test report generated and deployed to Pages"
  artifacts:
    paths:
      - public
    expire_in: 30 days
  only:
    - main
