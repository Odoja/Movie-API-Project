name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27018:27017

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create .env file for CI
      run: |
        cat > .env << EOF
        DB_CONNECTION_STRING="mongodb://localhost:27018/Movie-API-Project"
        PORT=8081
        BASE_URL="/"
        JWT_SECRET="your-super-secret-key-change-this-in-production-min-32-characters-long"
        ACCESS_TOKEN_LIFE="1h"
        EOF

    - name: Install wait-on
      run: npm install -g wait-on

    - name: Start server
      run: npm run dev &

    - name: Wait for server to be ready
      run: wait-on tcp:8081 --timeout 20000

    - name: Seed database
      env:
        DB_CONNECTION_STRING: mongodb://localhost:27018/Movie-API-Project
      run: node seeds/seedMovies.js
      
    - name: Run tests
      env:
        MONGO_URI: mongodb://localhost:27017/test_api
      run: newman run postman-collection.json -e test.postman_environment.json --insecure